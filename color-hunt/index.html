<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Color Hunt</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    font-family: Arial, sans-serif;
    background: #F4F6F9;
    touch-action: manipulation;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #game {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 450px;
    max-height: 920px;
    background: #F4F6F9;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .top-panel {
    position: relative;
    margin: 16px;
    padding: 16px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    z-index: 10;
  }

  .top-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 2px;
  }

  .exitButton {
    background: none;
    border: none;
    font-size: 14px;
    color: #999;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 10px;
  }

  .exitButton:hover, .exitButton:focus-visible {
    background: #F4F6F9;
    color: #4A6FA5;
  }

  .small-text {
    font-size: 14px;
    color: #666;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #prompt {
    font-size: 26px;
    font-weight: 700;
    color: #2E2E2E;
  }

  #feedback {
    margin-top: 6px;
    font-size: 16px;
    color: #4A6FA5;
    min-height: 20px;
  }

  .image-container {
    position: relative;
    flex: 1;
    width: 100%;
    background-size: 100% 100%;
    background-position: center;
    transition: background-image 0.2s ease;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1),
      rgba(0,0,0,0) 80%
    );
    pointer-events: none;
  }

  .zone {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    /* Temporary debug style: uncomment background below to see your zones during testing */
    /* background: rgba(255, 0, 0, 0.3); */
  }

  .ripple {
    position: absolute;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.95);
    transform: translate(-50%, -50%) scale(0.3);
    animation: ripple 650ms ease-out forwards;
    pointer-events: none;
  }

  @keyframes ripple {
    to {
      transform: translate(-50%, -50%) scale(2.6);
      opacity: 0;
    }
  }

  #complete {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0,0,0,0.5);
    z-index: 20;
  }

  #exitConfirm {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0,0,0,0.5);
    z-index: 25;
  }

  .complete-card {
    width: 100%;
    max-width: 320px;
    padding: 28px 24px;
    border-radius: 28px;
    background: rgba(255,255,255,0.95);
    text-align: center;
    box-shadow: 0 10px 36px rgba(0,0,0,0.3);
  }

  .complete-card h1 {
    margin: 0 0 12px;
    font-size: 28px;
    color: #2E2E2E;
  }

  .complete-card p {
    margin: 0 0 20px;
    font-size: 16px;
    line-height: 1.4;
    color: #555;
  }

  button.primaryButton {
    border: none;
    border-radius: 999px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 700;
    background: #4A6FA5;
    color: white;
    cursor: pointer;
  }

  button.secondaryButton {
    border: none;
    border-radius: 999px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    background: #DADFE5;
    color: #2E2E2E;
    cursor: pointer;
    margin-top: 10px;
  }
</style>
</head>

<body>
<div id="game">
  <div class="top-panel">
    <div class="top-row">
      <button class="exitButton" onclick="confirmExit()" aria-label="Exit game">&times; Exit</button>
    </div>
    <div class="small-text">Color Hunt</div>
    <div id="prompt">Find something blue.</div>
    <div id="feedback" aria-live="polite"></div>
  </div>

  <div class="image-container" id="stage">
    <div class="overlay"></div>
    <!-- Zones are rendered dynamically in JS, based on the chosen background -->
  </div>

  <div id="complete">
    <div class="complete-card">
      <h1>Well done.</h1>
      <p>You practiced bringing your attention back to the present moment.</p>
      <button class="primaryButton" onclick="restartGame()">Start Over</button>
    </div>
  </div>

  <div id="exitConfirm">
    <div class="complete-card">
      <h1 style="font-size:22px;">Leave the game?</h1>
      <p>Your current round progress won't be saved.</p>
      <button class="primaryButton" onclick="doExit()">Yes, exit</button>
      <button class="secondaryButton" onclick="cancelExit()">Stay</button>
    </div>
  </div>
</div>

<script>
  /*
    Each background has its own set of 7 zones, mapped by hand to real
    spots in that specific photo. Every zone carries its own unique id
    and its own prompt text, so different backgrounds can use different
    kinds of prompts - color-based ("find something blue") works well
    for the first two photos, but the rainforest photo is overwhelmingly
    green, which made "find something green" a frustrating, ambiguous
    search. That background instead uses object-based prompts ("find
    the parrot"), which map to distinct, findable subjects in the image.

    Positions are percentages of the image container (left/top/width/
    height), so they scale with the fixed-aspect-ratio #game box.
  */
  const backgrounds = [
    {
      file: "background.png",
      zones: [
        { id: "blue",   promptText: "Find something blue.",   left: 45, top: 9,  width: 46, height: 18 },
        { id: "orange", promptText: "Find something orange.", left: 55, top: 32, width: 40, height: 16 },
        { id: "white",  promptText: "Find something white.",  left: 42, top: 52, width: 42, height: 9 },
        { id: "green",  promptText: "Find something green.",  left: 0,  top: 48, width: 24, height: 24 },
        { id: "brown",  promptText: "Find something brown.",  left: 2,  top: 76, width: 48, height: 16 },
        { id: "gray",   promptText: "Find something gray.",   left: 55, top: 73, width: 42, height: 22 },
        { id: "pink",   promptText: "Find something pink.",   left: 4,  top: 4,  width: 45, height: 30 }
      ]
    },
    {
      // Mountain lake at sunset: pine forest, snow-capped peak, wooden dock
      file: "background2.png",
      zones: [
        { id: "blue",   promptText: "Find something blue.",   left: 55, top: 1,  width: 42, height: 11 },  // clear sky, upper right
        { id: "orange", promptText: "Find something orange.", left: 0,  top: 25, width: 22, height: 20 },  // sunset glow / sun flare, left
        { id: "white",  promptText: "Find something white.",  left: 5,  top: 80, width: 23, height: 14 },  // white daisies, bottom left
        { id: "green",  promptText: "Find something green.",  left: 55, top: 44, width: 40, height: 16 },  // pine forest line, right side
        { id: "brown",  promptText: "Find something brown.",  left: 45, top: 76, width: 42, height: 18 },  // wooden dock, bottom center
        { id: "gray",   promptText: "Find something gray.",   left: 30, top: 18, width: 45, height: 22 },  // mountain rock face, center
        { id: "pink",   promptText: "Find something pink.",   left: 30, top: 88, width: 12, height: 10 }   // wildflowers, bottom left
      ]
    },
    {
      // Rainforest waterfall - mostly green, so this background uses
      // distinct subjects instead of colors.
      file: "background3.png",
      zones: [
        { id: "parrot",    promptText: "Find the parrot.",              left: 0,  top: 15, width: 25, height: 30 }, // macaw, upper left
        { id: "toucan",    promptText: "Find the toucan.",              left: 78, top: 15, width: 20, height: 15 }, // upper right, on the branch
        { id: "sloth",     promptText: "Find the sloth.",               left: 82, top: 38, width: 18, height: 24 }, // right side, hanging
        { id: "frog",      promptText: "Find the frog.",                left: 15, top: 65, width: 15, height: 14 }, // lower left, on the mossy rock
        { id: "waterfall", promptText: "Find the waterfall.",           left: 35, top: 45, width: 25, height: 20 }, // center background
        { id: "flower",    promptText: "Find the flower.",              left: 0,  top: 82, width: 25, height: 16 }, // bromeliad, bottom left corner
        { id: "rocks",     promptText: "Find the rocks in the stream.", left: 32, top: 75, width: 45, height: 18 }  // across the bottom
      ]
    }
  ];

  let round = 0;
  let activePrompts = [];
  let currentBackground = null;
  let lastBackgroundFile = null; // avoids repeating the same photo back-to-back

  const promptEl = document.getElementById("prompt");
  const feedbackEl = document.getElementById("feedback");
  const completeEl = document.getElementById("complete");
  const exitConfirmEl = document.getElementById("exitConfirm");
  const stageEl = document.getElementById("stage");

  function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function pickBackground() {
    if (backgrounds.length === 1) return backgrounds[0];
    let choice;
    do {
      choice = backgrounds[Math.floor(Math.random() * backgrounds.length)];
    } while (choice.file === lastBackgroundFile);
    return choice;
  }

  function renderZones() {
    // Clear any previously rendered zones (keep the overlay div)
    stageEl.querySelectorAll(".zone").forEach(el => el.remove());

    currentBackground.zones.forEach(zoneData => {
      const zone = document.createElement("div");
      zone.className = "zone";
      zone.dataset.id = zoneData.id;
      zone.style.left = zoneData.left + "%";
      zone.style.top = zoneData.top + "%";
      zone.style.width = zoneData.width + "%";
      zone.style.height = zoneData.height + "%";
      zone.setAttribute("role", "button");
      zone.setAttribute("aria-label", "Tap this area");
      zone.addEventListener("click", onZoneClick);
      stageEl.appendChild(zone);
    });
  }

  function startGame() {
    currentBackground = pickBackground();
    lastBackgroundFile = currentBackground.file;
    stageEl.style.backgroundImage = `url("${currentBackground.file}")`;

    renderZones();

    // Prompts come from the current background's own zones, so each
    // photo can use whichever prompt style (color or object) fits it.
    activePrompts = shuffle(currentBackground.zones).slice(0, 5);
    round = 0;
    completeEl.style.display = "none";
    exitConfirmEl.style.display = "none";
    feedbackEl.textContent = "";
    updatePrompt();
  }

  function updatePrompt() {
    promptEl.textContent = activePrompts[round].promptText;
  }

  function showRipple(x, y) {
    const ripple = document.createElement("div");
    ripple.className = "ripple";

    const rect = stageEl.getBoundingClientRect();
    ripple.style.left = (x - rect.left) + "px";
    ripple.style.top = (y - rect.top) + "px";
    stageEl.appendChild(ripple);

    setTimeout(() => ripple.remove(), 700);
  }

  function gentleVibrate() {
    if (navigator.vibrate) {
      navigator.vibrate(35);
    }
  }

  function onZoneClick(e) {
    const zone = e.currentTarget;
    const neededId = activePrompts[round].id;
    const tappedId = zone.dataset.id;

    if (tappedId === neededId) {
      showRipple(e.clientX, e.clientY);
      gentleVibrate();

      feedbackEl.textContent = "Nice. Well noticed.";

      setTimeout(() => {
        round++;

        if (round >= activePrompts.length) {
          completeEl.style.display = "flex";
        } else {
          feedbackEl.textContent = "";
          updatePrompt();
        }
      }, 900);

    } else {
      feedbackEl.textContent = "Keep looking slowly.";
    }
  }

  function restartGame() {
    startGame();
  }

  function confirmExit() {
    exitConfirmEl.style.display = "flex";
  }

  function cancelExit() {
    exitConfirmEl.style.display = "none";
  }

  function doExit() {
    // This game has no separate instructions splash screen, so
    // "returning to the start" means resetting the round/score and
    // picking a fresh background, same as starting over.
    exitConfirmEl.style.display = "none";
    startGame();
  }

  startGame();
</script>
</body>
</html>
