<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Growing Compassion</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(to bottom, #b8dff5 0%, #eaf7ff 55%, #d9f2d0 100%);
    color: #2e2e2e;
    touch-action: manipulation;
  }

  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .top-box {
    position: absolute;
    top: 16px;
    left: 16px;
    right: 16px;
    padding: 16px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.9);
    text-align: center;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #1a1a1a;
  }

  .instructions {
    font-size: 14px;
    line-height: 1.4;
    color: #555;
  }

  #progressText {
    margin-top: 8px;
    font-size: 14px;
    color: #4a6fa5;
    font-weight: 700;
  }

  /* Redesigned clean pill-cloud for better text readability on mobile */
  .cloud {
    position: absolute;
    width: auto;
    max-width: 80vw;
    white-space: normal;
    word-wrap: break-word;
    padding: 12px 20px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    color: #333;
    z-index: 5;
    pointer-events: auto;
    animation: floatAcross linear forwards;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
  }

  .cloud.harsh {
    background: rgba(245, 248, 250, 0.92);
    color: #444;
  }

  .cloud.tapped {
    animation: dissolve 0.4s ease forwards;
  }

  .cloud.wrong {
    animation: gentleShake 0.35s ease;
  }

  @keyframes floatAcross {
    from { transform: translateX(-105%); }
    to { transform: translateX(105vw); }
  }

  @keyframes dissolve {
    to {
      transform: scale(0.8);
      opacity: 0;
    }
  }

  @keyframes gentleShake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
  }

  #garden {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32vh;
    z-index: 3;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }

  .grass {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 90px;
    background: linear-gradient(to top, #8bcf7a, #bfe8a8);
    border-radius: 100% 100% 0 0 / 25% 25% 0 0;
  }

  #flower {
    position: relative;
    width: 140px;
    height: 200px;
    z-index: 4;
    margin-bottom: 10px;
  }

  .stem {
    position: absolute;
    bottom: 20px;
    left: 66px;
    width: 8px;
    height: 0;
    background: #4f9d50;
    border-radius: 10px;
    transition: height 0.6s ease;
  }

  .leaf {
    position: absolute;
    width: 0;
    height: 0;
    background: #65b96a;
    border-radius: 100% 0 100% 0;
    opacity: 0;
    transition: all 0.6s ease;
  }

  .leaf.left {
    bottom: 60px;
    left: 32px;
    transform: rotate(-25deg);
  }

  .leaf.right {
    bottom: 90px;
    right: 32px;
    transform: rotate(115deg);
  }

  .flower-head {
    position: absolute;
    bottom: 130px;
    left: 50%;
    width: 80px;
    height: 80px;
    transform: translateX(-50%) scale(0);
    transform-origin: bottom center;
    transition: transform 0.8s ease;
  }

  .petal {
    position: absolute;
    width: 36px;
    height: 50px;
    background: #f6a8c9;
    border-radius: 50%;
    left: 22px;
    top: 15px;
    transform-origin: center 25px;
  }

  .p1 { transform: rotate(0deg) translateY(-25px); }
  .p2 { transform: rotate(60deg) translateY(-25px); }
  .p3 { transform: rotate(120deg) translateY(-25px); }
  .p4 { transform: rotate(180deg) translateY(-25px); }
  .p5 { transform: rotate(240deg) translateY(-25px); }
  .p6 { transform: rotate(300deg) translateY(-25px); }

  .center {
    position: absolute;
    width: 32px;
    height: 32px;
    background: #f8d36b;
    border-radius: 50%;
    left: 24px;
    top: 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .drop {
    position: absolute;
    width: 12px;
    height: 18px;
    background: #7fd1ff;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    animation: fall 0.6s ease-in forwards;
    z-index: 8;
  }

  @keyframes fall {
    to {
      transform: translateY(180px) rotate(-45deg);
      opacity: 0;
    }
  }

  #finalScreen {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, #cceeff, #f7fff3);
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  .final-card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 24px 20px;
    max-width: 320px;
    box-width: 90vw;
    box-shadow: 0 10px 24px rgba(0,0,0,0.1);
  }

  .final-flower {
    font-size: 54px;
    margin-bottom: 8px;
  }

  .final-title {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .final-message {
    font-size: 16px;
    line-height: 1.4;
    color: #444;
  }

  .done-btn {
    margin-top: 20px;
    border: none;
    background: #4a6fa5;
    color: white;
    padding: 12px 28px;
    font-size: 16px;
    border-radius: 999px;
    font-weight: 700;
  }
</style>
</head>

<body>
<div id="game">

  <div class="top-box" id="headerCard">
    <div class="title">Growing Compassion</div>
    <div class="instructions">
      Thoughts will pass by.<br>
      Tap the ones that help you grow.
    </div>
    <div id="progressText">0 / 6</div>
  </div>

  <div id="garden">
    <div class="grass"></div>

    <div id="flower">
      <div class="stem" id="stem"></div>
      <div class="leaf left" id="leafLeft"></div>
      <div class="leaf right" id="leafRight"></div>

      <div class="flower-head" id="flowerHead">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
        <div class="petal p6"></div>
        <div class="center"></div>
      </div>
    </div>
  </div>

  <div id="finalScreen">
    <div class="final-card">
      <div class="final-flower">🌸</div>
      <div class="final-title">Compassion Helps You Grow</div>
      <div class="final-message">
        The way you speak to yourself matters.<br><br>
        Practice choosing kindness, one thought at a time.
      </div>
      <button class="done-btn" onclick="finishGame()">Done</button>
    </div>
  </div>

</div>

<script>
  const compassionateThoughts = [
    "I'm allowed to learn.",
    "Everyone makes mistakes.",
    "One step is enough.",
    "I can try again.",
    "Rest is allowed.",
    "I'm doing my best today.",
    "This is hard, and I can be kind to myself.",
    "My worth is not one bad day.",
    "Progress does not have to be perfect.",
    "I can slow down."
  ];

  const harshThoughts = [
    "I'm such a failure.",
    "I should be doing more.",
    "Everyone else has it together.",
    "I always mess things up.",
    "I don't deserve a break.",
    "I'll never change.",
    "I have to be perfect.",
    "I'm not enough.",
    "I ruin everything.",
    "I can't handle this."
  ];

  let growth = 0;
  const goal = 6;
  let cloudInterval;
  let gameOver = false;
  let lastY = 0;

  const game = document.getElementById("game");
  const progressText = document.getElementById("progressText");
  const stem = document.getElementById("stem");
  const leafLeft = document.getElementById("leafLeft");
  const leafRight = document.getElementById("leafRight");
  const flowerHead = document.getElementById("flowerHead");
  const finalScreen = document.getElementById("finalScreen");
  const headerCard = document.getElementById("headerCard");

  function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function createCloud() {
    if (gameOver) return;

    const isCompassionate = Math.random() < 0.58;
    const cloud = document.createElement("div");

    cloud.className = "cloud " + (isCompassionate ? "kind" : "harsh");
    cloud.textContent = isCompassionate
      ? randomItem(compassionateThoughts)
      : randomItem(harshThoughts);

    // Dynamic Safe Spawning Zone Setup
    const headerRect = headerCard.getBoundingClientRect();
    const startY = headerRect.bottom + 15;
    const endY = window.innerHeight * 0.62;
    const zoneHeight = endY - startY;

    // Split the zone into 3 distinct bands to guarantee items don't overlap vertically
    let lane = Math.floor(Math.random() * 3);
    let targetY = startY + (lane * (zoneHeight / 3)) + (Math.random() * 10);

    // Prevent direct consecutive lane repeats
    if (Math.abs(targetY - lastY) < 45) {
      targetY = targetY + 50 > endY ? startY : targetY + 50;
    }
    lastY = targetY;

    cloud.style.top = targetY + "px";
    cloud.style.animationDuration = (7 + Math.random() * 4) + "s";

    cloud.addEventListener("click", () => {
      if (cloud.dataset.used === "true" || gameOver) return;
      cloud.dataset.used = "true";

      if (isCompassionate) {
        cloud.classList.add("tapped");
        makeDrop(cloud);
        growFlower();
        setTimeout(() => cloud.remove(), 400);
      } else {
        cloud.classList.add("wrong");
        setTimeout(() => {
          cloud.classList.remove("wrong");
          cloud.dataset.used = "false";
        }, 350);
      }
    });

    cloud.addEventListener("animationend", () => {
      cloud.remove();
    });

    game.appendChild(cloud);
  }

  function makeDrop(cloud) {
    const rect = cloud.getBoundingClientRect();
    const drop = document.createElement("div");

    drop.className = "drop";
    drop.style.left = (rect.left + rect.width / 2 - 6) + "px";
    drop.style.top = (rect.bottom - 5) + "px";

    game.appendChild(drop);
    setTimeout(() => drop.remove(), 600);
  }

  function growFlower() {
    growth++;
    progressText.textContent = growth + " / " + goal;

    if (growth >= 1) {
      stem.style.height = "50px";
    }
    if (growth >= 2) {
      stem.style.height = "80px";
      leafLeft.style.width = "38px";
      leafLeft.style.height = "24px";
      leafLeft.style.opacity = "1";
    }
    if (growth >= 3) {
      stem.style.height = "105px";
      leafRight.style.width = "42px";
      leafRight.style.height = "26px";
      leafRight.style.opacity = "1";
    }
    if (growth >= 4) {
      stem.style.height = "125px";
      flowerHead.style.transform = "translateX(-50%) scale(0.6)";
    }
    if (growth >= 5) {
      flowerHead.style.transform = "translateX(-50%) scale(0.85)";
    }
    if (growth >= 6) {
      flowerHead.style.transform = "translateX(-50%) scale(1)";
      endGame();
    }
  }

  function endGame() {
    gameOver = true;
    clearInterval(cloudInterval);

    document.querySelectorAll(".cloud").forEach(cloud => {
      cloud.style.transition = "opacity 0.4s ease";
      cloud.style.opacity = "0";
      setTimeout(() => cloud.remove(), 400);
    });

    setTimeout(() => {
      finalScreen.style.display = "flex";
    }, 700);
  }

  function finishGame() {
    window.history.back();
  }

  createCloud();
  cloudInterval = setInterval(createCloud, 2200); // Staggered delay slightly to minimize layout clumps
</script>

</body>
</html>
